<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextFix | Quick Text Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>TextFix</h1>
        <p>A simple place to change your text style instantly.</p>
        
        <textarea id="userInput" placeholder="Type or paste your text here..."></textarea>

        <div class="button-row">
            <button onclick="makeUpper()">UPPERCASE</button>
            <button onclick="makeLower()">lowercase</button>
            <button onclick="clearText()" class="clear-btn">Clear</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
